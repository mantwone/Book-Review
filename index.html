<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #FDFCFA;
    --line: #B7BEC6;
    --line-soft: #D8DCE1;
    --ink: #33363B;
    --ink-soft: #7C828A;
    --accent: #8C97A6;
    --accent-deep: #5B6573;
    --star-empty: #D2D6DB;
    --photo-fill: #EDEEF0;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    -webkit-font-smoothing: antialiased;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  .page-frame{
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 28px 70px;
    position: relative;
  }

  /* corner doodles */
  .doodle{
    position: absolute;
    opacity: 0.5;
    pointer-events: none;
    stroke: var(--ink-soft);
  }

  /* ---------- Header ---------- */

  .hero{
    text-align: center;
    padding: 20px 10px 30px;
    position: relative;
  }

  .hero h1{
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: clamp(2.8rem, 9vw, 4rem);
    margin: 0 0 6px;
    color: var(--ink);
    transform: rotate(-1deg);
  }

  .hero .underline{
    width: 220px;
    height: 10px;
    margin: 0 auto 14px;
  }

  .hero p.sub{
    font-size: 1.05rem;
    color: var(--ink-soft);
    font-style: italic;
    max-width: 460px;
    margin: 0 auto;
  }

  /* ---------- Stats ---------- */

  .stats{
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 22px 0 8px;
    flex-wrap: wrap;
    font-family: 'Space Mono', monospace;
  }
  .stat{ text-align: center; }
  .stat .n{
    font-size: 1.4rem;
    color: var(--accent-deep);
    display: block;
    line-height: 1;
  }
  .stat .l{
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* ---------- Controls ---------- */

  .controls{
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin: 28px 0 26px;
    padding-bottom: 18px;
    border-bottom: 1.5px dashed var(--line-soft);
  }

  .search-wrap{ flex: 1 1 200px; position: relative; }
  .search-wrap input{
    width: 100%;
    padding: 9px 12px 9px 30px;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    background: var(--paper);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    color: var(--ink);
  }
  .search-wrap input:focus{ outline: none; border-color: var(--accent-deep); }
  .search-wrap svg{ position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.5; pointer-events: none; }

  .filter-pills{ display: flex; gap: 6px; }
  .pill{
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.03em;
    padding: 8px 12px;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .pill.active{ background: var(--ink); border-color: var(--ink); color: var(--paper); }

  .dropdown-filters{
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    width: 100%;
    margin-top: 4px;
  }
  .dropdown-filters select{
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.02em;
    padding: 8px 10px;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    background: var(--paper);
    color: var(--ink-soft);
    cursor: pointer;
  }
  .dropdown-filters select:focus{ outline: none; border-color: var(--accent-deep); }
  .dropdown-filters select.is-active{ border-color: var(--ink); color: var(--ink); }

  .clear-filters{
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    background: none;
    border: none;
    text-decoration: underline;
    cursor: pointer;
    padding: 8px 4px;
    display: none;
  }
  .clear-filters.show{ display: inline-block; }

  .add-btn{
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.03em;
    padding: 9px 14px;
    border: 1.5px dashed var(--ink);
    border-radius: 999px;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
  }
  .add-btn:hover{ background: var(--ink); color: var(--paper); border-style: solid; }

  /* ---------- Review card (planner style) ---------- */

  .deck{ display: flex; flex-direction: column; gap: 26px; }

  .card{
    position: relative;
    border: 1.5px solid var(--line);
    border-radius: 18px;
    padding: 18px;
    background: var(--paper);
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 16px;
  }

  .card-photo{
    border: 1.5px solid var(--line);
    border-radius: 12px;
    background: var(--photo-fill);
    min-height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card-photo svg{ opacity: 0.35; }
  .card-photo img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-photo .photo-hint{
    position: absolute;
    bottom: 0; left: 0; right: 0;
    font-family: 'Space Mono', monospace;
    font-size: 7.5px;
    text-align: center;
    color: var(--ink-soft);
    background: rgba(253,252,250,0.85);
    padding: 3px 2px;
    letter-spacing: 0.03em;
  }

  .genre-tag{
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.03em;
  }
  .genre-tag select{
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    border: none;
    border-bottom: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
  }
  .genre-tag select:focus{ outline: none; }

  .card-main{ display: flex; flex-direction: column; gap: 9px; min-width: 0; }

  .card-top-row{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .stars{ display: flex; gap: 3px; }
  .star-btn{
    background: none; border: none; cursor: pointer; padding: 0; line-height: 0;
  }
  .star-btn svg{ width: 19px; height: 19px; }
  .star-btn .pt{ fill: var(--star-empty); stroke: var(--star-empty); transition: fill 0.12s, stroke 0.12s; }
  .star-btn.filled .pt{ fill: var(--accent-deep); stroke: var(--accent-deep); }
  .star-btn:hover .pt{ stroke: var(--accent-deep); }

  .recommend{
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .recommend select{
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    border: none;
    border-bottom: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
  }
  .recommend select:focus{ outline: none; }

  .field-row{
    display: flex;
    align-items: baseline;
    gap: 8px;
    border-bottom: 1.3px dotted var(--line-soft);
    padding-bottom: 4px;
  }
  .field-label{
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
    flex: 0 0 auto;
  }
  .field-value{
    flex: 1;
    font-size: 1.05rem;
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    background: transparent;
    border: none;
    min-width: 0;
  }
  .field-value:focus{ outline: none; }
  [contenteditable="true"].field-value:empty::before{
    content: attr(data-placeholder);
    color: var(--ink-soft);
    font-style: italic;
  }

  .thoughts-wrap{
    margin-top: 4px;
  }
  .thoughts-wrap .field-label{ display: block; margin-bottom: 4px; }
  .thoughts-lines{
    position: relative;
  }
  textarea.thoughts{
    width: 100%;
    border: none;
    background:
      repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 25px,
        var(--line-soft) 25px, var(--line-soft) 26.5px
      );
    line-height: 26.5px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--ink);
    resize: vertical;
    min-height: 80px;
    padding: 0;
  }
  textarea.thoughts:focus{ outline: none; }
  textarea.thoughts::placeholder{ color: var(--ink-soft); opacity: 0.6; }

  .remove-x{
    background: none; border: none; color: var(--ink-soft);
    opacity: 0.3; cursor: pointer; font-size: 17px; line-height: 1; padding: 0 2px;
  }
  .remove-x:hover{ opacity: 1; color: #B5443A; }

  .saved-tick{
    position: absolute;
    bottom: 8px; right: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--accent-deep);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .saved-tick.show{ opacity: 0.7; }

  @media (max-width: 480px){
    .card{ grid-template-columns: 64px 1fr; padding: 14px; }
    .card-photo{ min-height: 110px; }
  }

  .empty-state{
    text-align: center;
    padding: 50px 20px;
    color: var(--ink-soft);
    font-style: italic;
  }

  footer{
    text-align: center;
    padding: 30px 20px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    color: var(--ink-soft);
    letter-spacing: 0.03em;
  }

  /* Modal */
  .overlay{
    position: fixed; inset: 0;
    background: rgba(50,50,55,0.4);
    display: none; align-items: center; justify-content: center;
    z-index: 50; padding: 20px;
  }
  .overlay.open{ display: flex; }
  .modal{
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 16px;
    max-width: 380px; width: 100%;
    padding: 26px;
  }
  .modal h3{

    margin: 0 0 14px;
  }
  .modal input{
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--line);

    background: var(--paper);

    font-size: 1rem;
    margin-bottom: 14px;
  }
  .modal input:focus{ outline: none; border-color: var(--accent-deep); }
  .modal-actions{ display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button{
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 9px 14px;
    border-radius: 999px;
    cursor: pointer;
    border: 1.5px solid var(--line);
    background: transparent;
  }
  .modal-actions .confirm{ background: var(--ink); border-color: var(--ink); color: var(--paper); }
</style>

let searchTerm = '';
let genreFilter = '';
let authorFilter = '';
let ratingFilter = '';
let photoTargetId = null;

function slug(title, idx){
  return 'b' + idx + '_' + title.toLowerCase().replace(/[^a-z0-9]+/g, '').slice(0, 24);
}

async function loadState(){
  try{
    const res = await window.storage.get('planner-reviews-state');
    if(res && res.value){
      state = JSON.parse(res.value);
      state.books.forEach(b => {
        if(b.genre === undefined) b.genre = '';
        if(b.photoUrl === undefined) b.photoUrl = '';
      });
      return;
    }
  }catch(e){ /* not found, seed below */ }
  state = {
    books: SEED_BOOKS.map((b, i) => ({
      id: slug(b.title, i),
      title: b.title,
      author: '',
      genre: '',
      photoUrl: '',
      rating: 0,
      recommend: '',
      thoughts: ''
    }))
  };
  await persist();
}

let saveTimer = null;
async function persist(){
  try{ await window.storage.set('planner-reviews-state', JSON.stringify(state)); }
  catch(e){ console.error('Storage error', e); }
}
function schedulePersist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 500);
}

function starSVG(){
  return `<svg viewBox="0 0 24 24"><path class="pt" d="M12 2.5l2.97 6.26 6.78 0.86-5 4.95 1.27 6.93L12 17.6l-5.02 3.9 1.27-6.93-5-4.95 6.78-0.86L12 2.5z" stroke-width="1.3" stroke-linejoin="round"/></svg>`;
}

function renderStars(book){
  let html = '<div class="stars">';
  for(let i = 1; i <= 5; i++){
    const filled = book.rating >= i ? 'filled' : '';
    html += `<button class="star-btn ${filled}" data-book="${book.id}" data-val="${i}" aria-label="${i} étoile${i>1?'s':''}">${starSVG()}</button>`;
  }
  html += '</div>';
  return html;
}

function bookIconSVG(){
  return `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#7C828A" stroke-width="1.2"><path d="M4 4.5c2-1 5-1 8 0v15c-3-1-6-1-8 0V4.5z"/><path d="M20 4.5c-2-1-5-1-8 0v15c3-1 6-1 8 0V4.5z"/></svg>`;
}

function escapeHtml(s){
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function cardTemplate(book){
  const photoInner = book.photoUrl
    ? `<img src="${escapeHtml(book.photoUrl)}" alt="Couverture de ${escapeHtml(book.title)}" onerror="this.parentElement.classList.add('img-error')">`
    : `${bookIconSVG()}<div class="photo-hint">+ photo</div>`;
  return `
  <div class="card" data-id="${book.id}">
    <div class="card-photo" data-action="set-photo">${photoInner}</div>
    <div class="card-main">
      <div class="card-top-row">
        ${renderStars(book)}
        <div style="display:flex; align-items:center; gap:6px;">
          <div class="recommend">
            Recommandé
            <select data-field="recommend">
              <option value="" ${book.recommend===''?'selected':''}>—</option>
              <option value="Oui" ${book.recommend==='Oui'?'selected':''}>Oui</option>
              <option value="Non" ${book.recommend==='Non'?'selected':''}>Non</option>
            </select>
          </div>
          <button class="remove-x" data-action="delete" title="Retirer ce livre">&times;</button>
        </div>
      </div>
      <div class="field-row">
        <span class="field-label">Titre</span>
        <span class="field-value" contenteditable="true" data-field="title" spellcheck="false">${escapeHtml(book.title)}</span>
      </div>
      <div class="field-row">
        <span class="field-label">Auteur</span>
        <span class="field-value" contenteditable="true" data-field="author" data-placeholder="—" spellcheck="false">${escapeHtml(book.author)}</span>
      </div>
      <div class="field-row">
        <span class="field-label">Genre</span>
        <span class="genre-tag">
          <select data-field="genre">
            <option value="" ${book.genre===''?'selected':''}>—</option>
            ${GENRES.map(g => `<option value="${g}" ${book.genre===g?'selected':''}>${g}</option>`).join('')}
          </select>
        </span>
      </div>
      <div class="thoughts-wrap">
        <span class="field-label">Thoughts</span>
        <textarea class="thoughts" data-field="thoughts" placeholder="Qu'en as-tu pensé ?">${escapeHtml(book.thoughts)}</textarea>
      </div>
    </div>
    <div class="saved-tick">enregistré ✓</div>
  </div>`;
}

function matchesFilter(book){
  const hasReview = book.rating > 0 || book.thoughts.trim().length > 0;
  if(activeFilter === 'reviewed' && !hasReview) return false;
  if(activeFilter === 'pending' && hasReview) return false;
  if(searchTerm && !book.title.toLowerCase().includes(searchTerm.toLowerCase())) return false;
  if(genreFilter && book.genre !== genreFilter) return false;
  if(authorFilter && book.author !== authorFilter) return false;
  if(ratingFilter !== ''){
    const rf = parseInt(ratingFilter, 10);
    if(rf === 0){ if(book.rating !== 0) return false; }
    else { if(book.rating < rf) return false; }
  }
  return true;
}

function populateFilterOptions(){
  const genreSel = document.getElementById('filter-genre');
  const authorSel = document.getElementById('filter-author');

  const usedGenres = [...new Set(state.books.map(b => b.genre).filter(Boolean))].sort();
  const usedAuthors = [...new Set(state.books.map(b => b.author).filter(Boolean))].sort();

  const currentGenre = genreSel.value;
  genreSel.innerHTML = '<option value="">Genre — tous</option>' +
    usedGenres.map(g => `<option value="${g}" ${g===currentGenre?'selected':''}>${g}</option>`).join('');

  const currentAuthor = authorSel.value;
  authorSel.innerHTML = '<option value="">Auteur — tous</option>' +
    usedAuthors.map(a => `<option value="${escapeHtml(a)}" ${a===currentAuthor?'selected':''}>${escapeHtml(a)}</option>`).join('');
}

function updateClearButton(){
  const anyActive = genreFilter || authorFilter || ratingFilter !== '';
  document.getElementById('clear-filters').classList.toggle('show', !!anyActive);
  document.getElementById('filter-genre').classList.toggle('is-active', !!genreFilter);
  document.getElementById('filter-author').classList.toggle('is-active', !!authorFilter);
  document.getElementById('filter-rating').classList.toggle('is-active', ratingFilter !== '');
}

function renderGrid(){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty-state');
  populateFilterOptions();
  const visible = state.books.filter(matchesFilter);
  if(visible.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = visible.map(cardTemplate).join('');
  }
  renderStats();
  updateClearButton();
}

function renderStats(){
  const total = state.books.length;
  const reviewed = state.books.filter(b => b.rating > 0 || b.thoughts.trim()).length;
  const pending = total - reviewed;
  const ratings = state.books.filter(b => b.rating > 0).map(b => b.rating);
  const avg = ratings.length ? (ratings.reduce((a,b) => a+b, 0) / ratings.length).toFixed(1) : '–';
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-reviewed').textContent = reviewed;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-avg').textContent = avg;
}

function flashSaved(card){
  const tick = card.querySelector('.saved-tick');
  if(!tick) return;
  tick.classList.add('show');
  clearTimeout(tick._t);
  tick._t = setTimeout(() => tick.classList.remove('show'), 1400);
}

function findBook(id){ return state.books.find(b => b.id === id); }

document.getElementById('grid').addEventListener('click', (e) => {
  const starBtn = e.target.closest('.star-btn');
  if(starBtn){
    const id = starBtn.dataset.book;
    const val = parseInt(starBtn.dataset.val, 10);
    const book = findBook(id);
    book.rating = (book.rating === val) ? 0 : val;
    renderGrid();
    schedulePersist();
    return;
  }
  const delBtn = e.target.closest('[data-action="delete"]');
  if(delBtn){
    const card = delBtn.closest('.card');
    const id = card.dataset.id;
    state.books = state.books.filter(b => b.id !== id);
    renderGrid();
    schedulePersist();
    return;
  }
  const photoBox = e.target.closest('[data-action="set-photo"]');
  if(photoBox){
    const card = photoBox.closest('.card');
    photoTargetId = card.dataset.id;
    const book = findBook(photoTargetId);
    document.getElementById('photo-url-input').value = book.photoUrl || '';
    document.getElementById('photo-overlay').classList.add('open');
    document.getElementById('photo-url-input').focus();
    return;
  }
});

document.getElementById('grid').addEventListener('input', (e) => {
  const field = e.target.dataset.field;
  if(!field) return;
  const card = e.target.closest('.card');
  const id = card.dataset.id;
  const book = findBook(id);
  if(field === 'title'){ book.title = e.target.textContent.trim(); }
  else if(field === 'author'){ book.author = e.target.textContent.trim(); }
  else if(field === 'thoughts'){ book.thoughts = e.target.value; }
  flashSaved(card);
  schedulePersist();
});

document.getElementById('grid').addEventListener('change', (e) => {
  const card = e.target.closest('.card');
  if(!card) return;
  const book = findBook(card.dataset.id);
  if(e.target.dataset.field === 'recommend'){
    book.recommend = e.target.value;
    schedulePersist();
  } else if(e.target.dataset.field === 'genre'){
    book.genre = e.target.value;
    renderGrid();
    schedulePersist();
  }
});

document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderGrid();
});

document.getElementById('filter-genre').addEventListener('change', (e) => {
  genreFilter = e.target.value;
  renderGrid();
});
document.getElementById('filter-author').addEventListener('change', (e) => {
  authorFilter = e.target.value;
  renderGrid();
});
document.getElementById('filter-rating').addEventListener('change', (e) => {
  ratingFilter = e.target.value;
  renderGrid();
});
document.getElementById('clear-filters').addEventListener('click', () => {
  genreFilter = ''; authorFilter = ''; ratingFilter = '';
  document.getElementById('filter-genre').value = '';
  document.getElementById('filter-author').value = '';
  document.getElementById('filter-rating').value = '';
  renderGrid();
});

const photoOverlay = document.getElementById('photo-overlay');
document.getElementById('cancel-photo').addEventListener('click', () => {
  photoOverlay.classList.remove('open');
  photoTargetId = null;
});
photoOverlay.addEventListener('click', (e) => {
  if(e.target === photoOverlay){ photoOverlay.classList.remove('open'); photoTargetId = null; }
});
document.getElementById('confirm-photo').addEventListener('click', () => {
  if(!photoTargetId) return;
  const book = findBook(photoTargetId);
  book.photoUrl = document.getElementById('photo-url-input').value.trim();
  photoOverlay.classList.remove('open');
  photoTargetId = null;
  renderGrid();
  schedulePersist();
});
document.getElementById('photo-url-input').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') document.getElementById('confirm-photo').click();
});

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeFilter = p.dataset.filter;
    renderGrid();
  });
});

const overlay = document.getElementById('overlay');
document.getElementById('open-add').addEventListener('click', () => {
  overlay.classList.add('open');
  document.getElementById('new-title').value = '';
  document.getElementById('new-title').focus();
});
document.getElementById('cancel-add').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('open'); });

document.getElementById('confirm-add').addEventListener('click', () => {
  const title = document.getElementById('new-title').value.trim();
  if(!title) return;
  const newBook = {
    id: 'custom_' + Date.now(),
    title,
    author: '',
    genre: '',
    photoUrl: '',
    rating: 0,
    recommend: '',
    thoughts: ''
  };
  state.books.unshift(newBook);
  overlay.classList.remove('open');
  activeFilter = 'all';
  document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
  document.querySelector('.pill[data-filter="all"]').classList.add('active');
  renderGrid();
  schedulePersist();
});
document.getElementById('new-title').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') document.getElementById('confirm-add').click();
});

(async function init(){
  await loadState();
  renderGrid();
})();
</script>
</body>
</html>
